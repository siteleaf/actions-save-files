name: Save files to Siteleaf
description: Upload compiled static site files to Siteleaf preview storage

inputs:
  publish_dir:
    description: Directory to upload
    required: false
    default: _site
  compare_size_only:
    description: Compare only file sizes instead of timestamps (faster)
    required: false
    default: false

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::548212765079:role/github.${{ github.repository_owner }} #.${{ github.event.repository.name }}
        aws-region: us-east-1
        retry-max-attempts: 1

    - name: Deploy to Siteleaf (comparing size only)
      if: inputs.compare_size_only == 'true'
      shell: bash
      run: |
        aws s3 sync \
          "${{ inputs.publish_dir }}/" \
          "s3://siteleaf-cloud/${{ github.repository }}/${{ github.ref_name }}/" \
          --delete \
          --size-only
    
    - name: Deploy to Siteleaf
      if: inputs.compare_size_only != 'true'
      shell: bash
      run: |
        aws s3 sync \
          "${{ inputs.publish_dir }}/" \
          "s3://siteleaf-cloud/${{ github.repository }}/${{ github.ref_name }}/" \
          --delete

    - name: Get Preview URL
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        PREVIEW_URL=$(curl -fsS \
          "https://api.cloud-preview.siteleaf.com/_url?org=${{ github.repository_owner }}&repo=${{ github.event.repository.name }}&ref=${{ github.ref_name }}")
    
        echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          
    - name: Comment Preview URL on PRs
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        PREVIEW_URL: ${{ env.PREVIEW_URL }}
      with:
        script: |
          const marker = "<!-- siteleaf-preview -->";
          const body = `${marker}
          🚀 **Preview:** <${process.env.PREVIEW_URL}>`;
    
          async function ignorePermissionErrors(fn) {
            try {
              return await fn();
            } catch (error) {
              if (error.status === 403) {
                core.info("Skipping PR comment; token does not have permission.");
                return null;
              }
              throw error;
            }
          }
    
          const comments = await ignorePermissionErrors(() =>
            github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
          );
    
          if (!comments) return;
    
          const existing = comments.data.find(
            c => c.user.login === "github-actions[bot]" && c.body.includes(marker)
          );
    
          if (existing) {
            await ignorePermissionErrors(() =>
              github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            );
          } else {
            await ignorePermissionErrors(() =>
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            );
          }
