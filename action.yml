name: Save files to Siteleaf
description: Upload compiled static site files to Siteleaf preview storage

inputs:
  publish_dir:
    description: Directory to upload
    required: false
    default: _site
  compare_size_only:
    description: Compare only file sizes instead of timestamps (faster)
    required: false
    default: false

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::548212765079:role/github.${{ github.repository_owner }} #.${{ github.event.repository.name }}
        aws-region: us-east-1
        retry-max-attempts: 1

    - name: Deploy to Siteleaf (comparing size only)
      if: inputs.compare_size_only == 'true'
      shell: bash
      run: |
        aws s3 sync \
          "${{ inputs.publish_dir }}/" \
          "s3://siteleaf-cloud/${{ github.repository }}/${{ github.ref_name }}/" \
          --delete \
          --size-only
    
    - name: Deploy to Siteleaf
      if: inputs.compare_size_only != 'true'
      shell: bash
      run: |
        aws s3 sync \
          "${{ inputs.publish_dir }}/" \
          "s3://siteleaf-cloud/${{ github.repository }}/${{ github.ref_name }}/" \
          --delete

    - name: Get Preview URL
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        PREVIEW_URL=$(curl -fsS \
          "https://api.cloud-preview.siteleaf.com/_url?org=${{ github.repository_owner }}&repo=${{ github.event.repository.name }}&ref=${{ github.ref_name }}")
    
        echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          
    - name: Comment Preview URL on PRs
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        MARKER="<!-- siteleaf-preview -->"

        COMMENT_ID=$(gh api \
          repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          --jq ".[] | select(.user.login==\"github-actions[bot]\" and (.body | contains(\"$MARKER\"))) | .id" \
          | head -n1)
        
        BODY="$MARKER 🚀 Preview: $PREVIEW_URL"
        
        if [ -n "$COMMENT_ID" ]; then
          gh api \
            repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
            --method PATCH \
            -f body="$BODY"
        else
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "$BODY"
        fi
